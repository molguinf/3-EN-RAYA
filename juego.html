<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRES EN RAYA — Juego</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
 
  <span class="screen-label" id="screen-label">Juego 1</span>
 
  <!-- Botones navegación -->
  <div class="nav-buttons">
    <a class="btn-nav" href="inicio.html">Inicio</a>
    <a class="btn-nav" href="instrucciones.html">Instrucciones</a>
  </div>
 
  <!-- Tablero + overlay -->
  <div class="game-wrapper">
    <div class="board-container">
 
      <!-- Overlay ganador (encima del tablero) -->
      <div class="winner-overlay" id="winner-overlay">
        <div class="winner-text" id="winner-text"></div>
      </div>
 
      <!-- Tablero -->
      <div class="board" id="board">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
      </div>
 
    </div>
 
    <button class="btn-green" id="btn-reiniciar">REINICIAR</button>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
